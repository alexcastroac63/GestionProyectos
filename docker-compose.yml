# =========================================================
# Docker Compose - Arquitectura de Contenedores Lifecycle PMO
# Optimizada para Despliegues en Servidores Debian usando Portainer Stacks
# =========================================================
#
# Para correr este Stack en Portainer administrando un servidor Debian:
# 1. En Portainer, vaya a Stacks -> Add Stack.
# 2. Defina el nombre del stack como: pmo-cluster-stack
# 3. Pegue el contenido de este archivo en el Editor Web (Web Editor).
# 4. Asegúrese de que el código fuente esté disponible en el mismo directorio
#    si compila en local, o use Despliegue mediante Repositorio Git en Portainer.
#

version: '3.8'

services:
  # =======================================================
  # 1. CONTENEDOR PRINCIPAL: UNIFICADO (VITE + EXPRESS SERVER)
  # =======================================================
  # Este contenedor empaqueta la UI de React y el servidor backend de Express
  # en un solo artefacto optimizado para producción, sirviendo todo por el puerto 3000.
  pmo-web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pmo_web_ui
    ports:
      - "3000:3000" # Acceso externo principal a la plataforma de auditoría y control
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    depends_on:
      pmo-postgres-db:
        condition: service_healthy
      pmo-s3-simulator:
        condition: service_healthy

  # =======================================================
  # 2. CONTENEDOR DE LA BASE DE DATOS (POSTGRESQL)
  # =======================================================
  # Base de datos relacional para guardar información de proyectos, sprints y costos.
  pmo-postgres-db:
    image: postgres:16.3-alpine
    container_name: pmo_postgres_db
    ports:
      - "5432:5432" # Puerto oficial expuesto para auditoría y herramientas DBA externas
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: pmo_database
    volumes:
      - pmo-postgres-volume-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d pmo_database"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =======================================================
  # 3. CONTENEDOR DE REPOSITORIO DE ARCHIVOS ADJUNTOS (S3)
  # =======================================================
  # Simulador S3 de almacenamiento persistente usando MinIO para facturas, actas y soportes.
  pmo-s3-simulator:
    image: minio/minio:latest
    container_name: pmo_s3_simulator
    ports:
      - "9000:9000" # API Endpoint S3 compatible (SDK, AWS CLI)
      - "9001:9001" # Consola Web Administrativa (Exploración visual de buckets)
    environment:
      MINIO_ROOT_USER: aws_mock_key_id
      MINIO_ROOT_PASSWORD: aws_mock_secret_key
    volumes:
      - pmo-storage-bucket-data:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Script de Auto-Aprovisionamiento inicial para el bucket de almacenamiento persistente
  pmo-s3-provisioner:
    image: minio/mc:latest
    container_name: pmo_s3_provisioner
    depends_on:
      pmo-s3-simulator:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local_s3 http://pmo-s3-simulator:9000 aws_mock_key_id aws_mock_secret_key;
      mc mb --ignore-existing local_s3/soporte-pmo-bucket;
      mc anonymous set public local_s3/soporte-pmo-bucket;
      echo '=========================================================';
      echo '✓ BUCKET S3 SIMULADO (soporte-pmo-bucket) CREADO CON ÉXITO';
      echo '✓ ENDPOINT API S3: http://localhost:9000';
      echo '=========================================================';
      exit 0;
      "

# Definición de volúmenes persistentes gestionados por Docker en Debian
volumes:
  pmo-storage-bucket-data:
    name: pmo-storage-bucket-data
    driver: local
  pmo-postgres-volume-data:
    name: pmo-postgres-volume-data
    driver: local
