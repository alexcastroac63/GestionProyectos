# Docker Compose - Arquitectura de Contenedores de Control Integral PMO
version: '3.8'

services:
  # ==========================================
  # 1. CONTENEDOR DE LA USER INTERFACE (UI)
  # ==========================================
  pmo-web-ui:
    image: node:20-alpine
    container_name: pmo_web_ui
    ports:
      - "3000:3000" # Acceso externo exclusivo de la UI
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:4000
    volumes:
      - .:/app
    working_dir: /app
    command: npm run start
    restart: always
    depends_on:
      - pmo-backend-services

  # ==========================================
  # 2. CONTENEDOR DEL BACKEND DE SERVICIOS
  # ==========================================
  pmo-backend-services:
    image: node:20-alpine
    container_name: pmo_backend_services
    ports:
      - "4000:4000" # Puerto interno/externo del API Gateway y microservicios
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres_user:postgres_secure_pass@pmo-postgres-db:5432/pmo_database
      - S3_ENDPOINT=http://pmo-s3-simulator:9000
      - S3_BUCKET=soporte-pmo-bucket
      - S3_ACCESS_KEY=aws_mock_key_id
      - S3_SECRET_KEY=aws_mock_secret_key
    volumes:
      - .:/app
    working_dir: /app
    command: node dist/server.cjs
    restart: always
    depends_on:
      pmo-postgres-db:
        condition: service_healthy
      pmo-s3-simulator:
        condition: service_healthy

  # ==========================================
  # 3. CONTENEDOR DE REPOSITORIO DE ARCHIVOS ADJUNTOS
  # ==========================================
  pmo-s3-simulator:
    image: minio/minio:RELEASE.2024-05-10T01-39-51Z
    container_name: pmo_s3_simulator
    ports:
      - "9000:9000" # API Endpoint S3 (Ej. AWS CLI, integrations)
      - "9001:9001" # Consola Web Administrativa (Explorador de buckets y archivos)
    environment:
      MINIO_ROOT_USER: aws_mock_key_id
      MINIO_ROOT_PASSWORD: aws_mock_secret_key
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Script Auto-Aprovisionador de bucket de almacenamiento persistente
  pmo-s3-provisioner:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    container_name: pmo_s3_provisioner
    depends_on:
      pmo-s3-simulator:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local_s3 http://pmo-s3-simulator:9000 aws_mock_key_id aws_mock_secret_key;
      mc mb --ignore-existing local_s3/soporte-pmo-bucket;
      mc anonymous set public local_s3/soporte-pmo-bucket;
      echo '=========================================================';
      echo '✓ BUCKET S3 SIMULADO (soporte-pmo-bucket) CREADO CON ÉXITO';
      echo '✓ ENDPOINT API S3: http://localhost:9000';
      echo '=========================================================';
      exit 0;
      "

  # ==========================================
  # 4. CONTENEDOR PARA LA BASE DE DATOS
  # ==========================================
  pmo-postgres-db:
    image: postgres:16.3-alpine
    container_name: pmo_postgres_db
    ports:
      - "5432:5432" # Puerto oficial de PostgreSQL
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: pmo_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d pmo_database"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local

