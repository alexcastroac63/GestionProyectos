# Docker Compose para Simular AWS Amazon S3 Localmente con MinIO de alto rendimiento
version: '3.8'

services:
  # Servidor S3 compatible de MinIO. Se comunica a través del puerto 9000 (API) y 9001 (Consola Web)
  s3-simulator:
    image: minio/minio:RELEASE.2024-05-10T01-39-51Z
    container_name: pmo_s3_simulator
    ports:
      - "9000:9000" # API Endpoint S3 (Ej. AWS CLI, SDK integrations)
      - "9001:9001" # Consola Web Administrativa (IU para explorar buckets y archivos)
    environment:
      MINIO_ROOT_USER: aws_mock_key_id
      MINIO_ROOT_PASSWORD: aws_mock_secret_key
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Contenedor de aprovisionamiento automatizado usando el MinIO Client (mc)
  # Crea el bucket y configura políticas públicas similares a AWS de forma automática en el arranque
  s3-provisioner:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    container_name: pmo_s3_provisioner
    depends_on:
      s3-simulator:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local_s3 http://s3-simulator:9000 aws_mock_key_id aws_mock_secret_key;
      mc mb --ignore-existing local_s3/soporte-pmo-bucket;
      mc anonymous set public local_s3/soporte-pmo-bucket;
      echo '=========================================================';
      echo '✓ BUCKET S3 SIMULADO (soporte-pmo-bucket) CREADO CON ÉXITO';
      echo '✓ ENDPOINT API S3: http://localhost:9000';
      echo '✓ CONSOLA ADMINISTRATOR: http://localhost:9001';
      echo '=========================================================';
      exit 0;
      "

volumes:
  minio_data:
    driver: local
