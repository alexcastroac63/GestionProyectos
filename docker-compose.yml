# =========================================================
# Docker Compose - Arquitectura de Contenedores Lifecycle PMO
# Optimizada para Despliegues de Producción y Portainer Stacks
# =========================================================

version: '3.8'

services:
  # =======================================================
  # 1. CONTENEDOR PRINCIPAL: UNIFICADO (VITE + EXPRESS SERVER)
  # =======================================================
  pmo-web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pmo_web_ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-secure-lifecycle-pmo-pmo-cluster-stack-key-2026}
    restart: always
    # Finding 8: Use service_started to prevent DBA blockages on fast bootups
    depends_on:
      pmo-postgres-db:
        condition: service_started
      pmo-s3-simulator:
        condition: service_started
    # Finding 9: Add standard production container healthcheck
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =======================================================
  # 2. CONTENEDOR DE LA BASE DE DATOS (POSTGRESQL)
  # =======================================================
  pmo-postgres-db:
    image: postgres:16.3-alpine
    container_name: pmo_postgres_db
    ports:
      - "5432:5432"
    # Finding 6: Secure secrets via env template variables with defaults
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-pmo_database}
    volumes:
      - pmo-postgres-volume-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres_user} -d $${POSTGRES_DB:-pmo_database}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # =======================================================
  # 3. CONTENEDOR DE REPOSITORIO DE ARCHIVOS ADJUNTOS (S3)
  # =======================================================
  pmo-s3-simulator:
    # Finding 12: Fixed immutable stable tags instead of "latest"
    image: minio/minio:RELEASE.2024-06-06T09-36-42Z
    container_name: pmo_s3_simulator
    ports:
      - "9000:9000"
      - "9001:9001"
    # Finding 6: Secure secrets in env templates
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aws_mock_key_id}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aws_mock_secret_key}
    volumes:
      - pmo-storage-bucket-data:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Script de Auto-Aprovisionamiento inicial para el bucket de almacenamiento persistente
  pmo-s3-provisioner:
    # Finding 12: Fixed immutable stable tags
    image: minio/mc:RELEASE.2024-06-06T15-28-56Z
    container_name: pmo_s3_provisioner
    depends_on:
      pmo-s3-simulator:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local_s3 http://pmo-s3-simulator:9000 $${MINIO_ROOT_USER:-aws_mock_key_id} $${MINIO_ROOT_PASSWORD:-aws_mock_secret_key};
      mc mb --ignore-existing local_s3/soporte-pmo-bucket;
      mc anonymous set private local_s3/soporte-pmo-bucket;
      echo '=========================================================';
      echo '✓ BUCKET S3 SIMULADO (soporte-pmo-bucket) CREADO CON ÉXITO';
      echo '✓ ACCESO PRIVADO RESPALDADO - SIN REVELACIÓN ANÓNIMA (F7)';
      echo '✓ ENDPOINT API S3: http://localhost:9000';
      echo '=========================================================';
      exit 0;
      "

# Volumenes persistentes federados
volumes:
  pmo-storage-bucket-data:
    name: pmo-storage-bucket-data
    driver: local
  pmo-postgres-volume-data:
    name: pmo-postgres-volume-data
    driver: local
